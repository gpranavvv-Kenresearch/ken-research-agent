name: Ken Research Posting Bot

on:
  schedule:
    # IST = UTC+5:30  |  All times below are UTC
    - cron: '0 5 * * 1-6'    # B1  10:30 IST
    - cron: '45 5 * * 1-6'   # B2  11:15 IST
    - cron: '30 6 * * 1-6'   # B3  12:00 IST
    - cron: '30 7 * * 1-6'   # B4  13:00 IST
    - cron: '30 8 * * 1-6'   # B5  14:00 IST
    - cron: '30 9 * * 1-6'   # B6  15:00 IST
    - cron: '30 10 * * 1-6'  # B7  16:00 IST
    - cron: '45 11 * * 1-6'  # B8  17:15 IST
  workflow_dispatch:          # manual trigger from GitHub UI

# Only one batch runs at a time
concurrency:
  group: posting-bot
  cancel-in-progress: false

jobs:
  post-batch:
    name: Post — ${{ matrix.person }}
    runs-on: ubuntu-latest
    timeout-minutes: 35

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - person: vansh
            worker: 0
          - person: pranav
            worker: 1
          - person: shrey
            worker: 2
          - person: abhinav
            worker: 3
          - person: aniket
            worker: 4
          - person: krishi
            worker: 5
          - person: sameeksha
            worker: 6
          - person: hritika
            worker: 7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Write account configs
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ACCOUNTS: ${{ secrets.ACCOUNTS_JSON }}
        run: |
          mkdir -p .accounts
          printf '%s' "$SA_JSON" > .accounts/google-service-account.json
          printf '%s' "$ACCOUNTS" > .accounts/accounts.json

      - name: Restore cookie sessions
        env:
          COOKIES_X_1:   ${{ secrets.COOKIES_X_1 }}
          COOKIES_X_2:   ${{ secrets.COOKIES_X_2 }}
          COOKIES_FB_1:  ${{ secrets.COOKIES_FB_1 }}
          COOKIES_FB_2:  ${{ secrets.COOKIES_FB_2 }}
          COOKIES_FB_3:  ${{ secrets.COOKIES_FB_3 }}
          COOKIES_FB_4:  ${{ secrets.COOKIES_FB_4 }}
          COOKIES_LI_1:  ${{ secrets.COOKIES_LI_1 }}
          COOKIES_LI_2:  ${{ secrets.COOKIES_LI_2 }}
          COOKIES_LI_3:  ${{ secrets.COOKIES_LI_3 }}
          COOKIES_LI_4:  ${{ secrets.COOKIES_LI_4 }}
          COOKIES_LI_5:  ${{ secrets.COOKIES_LI_5 }}
          COOKIES_LI_6:  ${{ secrets.COOKIES_LI_6 }}
        run: node --import=tsx scripts/restore-cookies.ts

      - name: Run posting batch for ${{ matrix.person }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          WORKER_NAME: ${{ matrix.person }}
          HEADLESS: 'true'
        run: node --import=tsx scripts/gh-worker.ts
