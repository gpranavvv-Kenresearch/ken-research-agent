services:
  - type: web
    name: ken-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn ken_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ken_backend.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ken-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false   # paste from Upstash dashboard
      - key: ALLOWED_HOSTS
        value: ken-backend.onrender.com
      - key: REPO_ROOT
        value: /opt/render/project/src/..   # parent of ken_backend/

  - type: worker
    name: ken-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A ken_backend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ken_backend.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: ken-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        fromService:
          name: ken-backend
          type: web
          envVarKey: SECRET_KEY

databases:
  - name: ken-postgres
    plan: free
    databaseName: ken_backend
    user: ken_admin
